name: Static Build And cPanel Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cpanel-static-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
      CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
      CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
      CPANEL_TARGET_DIR: ${{ secrets.CPANEL_TARGET_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Export
        run: npm run build:cpanel

      - name: Prepare Deploy Package
        run: |
          mkdir -p deploy-package
          cp -R out/. deploy-package/
          cp cpanel-release/.htaccess deploy-package/.htaccess

      - name: Upload Static Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 34motokuryeistanbul-static-package
          path: deploy-package
          if-no-files-found: error

      - name: Resolve Deploy Target
        id: deploy_target
        run: |
          if [ -n "$CPANEL_TARGET_DIR" ]; then
            echo "server_dir=$CPANEL_TARGET_DIR" >> "$GITHUB_OUTPUT"
          else
            echo "server_dir=/public_html/" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy To cPanel FTP
        if: ${{ env.CPANEL_FTP_HOST != '' && env.CPANEL_FTP_USERNAME != '' && env.CPANEL_FTP_PASSWORD != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.CPANEL_FTP_HOST }}
          username: ${{ env.CPANEL_FTP_USERNAME }}
          password: ${{ env.CPANEL_FTP_PASSWORD }}
          local-dir: deploy-package/
          server-dir: ${{ steps.deploy_target.outputs.server_dir }}
          dangerous-clean-slate: false